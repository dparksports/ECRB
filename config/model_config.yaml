# ECRB Model Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Each model entry defines the provider, routing details, and context limits.
# The `api_key_env_var` field specifies the environment variable holding the key.
# ─────────────────────────────────────────────────────────────────────────────

models:
  gpt-4o:
    provider: openai
    model_id: gpt-4o
    api_key_env_var: OPENAI_API_KEY
    endpoint_url: https://api.openai.com/v1
    max_context_window: 128000

  gpt-4o-mini:
    provider: openai
    model_id: gpt-4o-mini
    api_key_env_var: OPENAI_API_KEY
    endpoint_url: https://api.openai.com/v1
    max_context_window: 128000

  claude-3-5-sonnet:
    provider: anthropic
    model_id: anthropic/claude-3-5-sonnet-20241022
    api_key_env_var: ANTHROPIC_API_KEY
    endpoint_url: https://api.anthropic.com
    max_context_window: 200000

  claude-3-opus:
    provider: anthropic
    model_id: anthropic/claude-3-opus-20240229
    api_key_env_var: ANTHROPIC_API_KEY
    endpoint_url: https://api.anthropic.com
    max_context_window: 200000

  gemini-2.0-flash:
    provider: gemini
    model_id: gemini/gemini-2.0-flash
    api_key_env_var: GEMINI_API_KEY
    endpoint_url: https://generativelanguage.googleapis.com
    max_context_window: 1048576

  gemini-1.5-pro:
    provider: gemini
    model_id: gemini/gemini-1.5-pro
    api_key_env_var: GEMINI_API_KEY
    endpoint_url: https://generativelanguage.googleapis.com
    max_context_window: 2097152

  local-vllm:
    provider: local
    model_id: openai/local-model
    api_key_env_var: VLLM_API_KEY
    endpoint_url: http://localhost:8000/v1
    max_context_window: 32000

# Default settings applied to all runs unless overridden via CLI.
defaults:
  temperature: 0.0
  max_output_tokens: 4096
  token_step_size: 10000
